name: Build Morphe-patched apps

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *" # daily at 05:15 UTC

permissions:
  contents: write
  actions: read

# Allow only one in-flight build for this workflow. Concurrent runs would
# race on state.json + download_urls; this lets the runner cancel the
# older one instead of producing a corrupt commit.
concurrency:
  group: morphe-build
  cancel-in-progress: false

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      matrix-include: ${{ steps.check.outputs.matrix-include }}
      repo-versions: ${{ steps.check.outputs.repo-versions }}
      cli-version: ${{ steps.check.outputs.cli-version }}
      cli-branch: ${{ steps.check.outputs.cli-branch }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve latest Morphe + CLI versions
        id: check
        run: bash scripts/check_versions.sh

      - name: Setup Node.js
        if: steps.check.outputs.should-build == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        if: steps.check.outputs.should-build == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.check.outputs.should-build == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package.json', 'package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        if: steps.check.outputs.should-build == 'true'
        env:
          PLAYWRIGHT_CHROMIUM_DOWNLOAD_HOST: https://storage.googleapis.com/chrome-for-testing-public
        run: bash scripts/install_playwright.sh

      - name: Upload Playwright browsers for build jobs
        if: steps.check.outputs.should-build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-browsers
          path: ~/.cache/ms-playwright
          retention-days: 1

      - name: Cache apkeep
        id: cache-apkeep
        if: steps.check.outputs.should-build == 'true'
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/apkeep
          key: apkeep-${{ runner.os }}-v1

      - name: Install apkeep
        if: steps.check.outputs.should-build == 'true'
        run: bash scripts/install_apkeep.sh

      - name: Upload apkeep for build jobs
        if: steps.check.outputs.should-build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: apkeep-binary
          path: /usr/local/bin/apkeep
          retention-days: 1

      - name: Download morphe-cli + patches .mpp
        id: tools
        if: steps.check.outputs.should-build == 'true'
        env:
          CLI_REPO: MorpheApp/morphe-cli
          CLI_TAG: ${{ steps.check.outputs.cli-version }}
          REPO_VERSIONS: ${{ steps.check.outputs.repo-versions }}
        run: bash scripts/download_morphe_tools.sh

      - name: Cache morphe-cli and patches
        if: steps.check.outputs.should-build == 'true'
        uses: actions/cache@v5
        with:
          path: |
            tools/morphe-cli.jar
            tools/*.mpp
          key: morphe-tools-cli-${{ steps.check.outputs.cli-version }}-repos-${{ hashFiles('config.json') }}
          restore-keys: |
            morphe-tools-cli-${{ steps.check.outputs.cli-version }}-
            morphe-tools-

      - name: Install aapt for APK version validation
        id: aapt
        if: steps.check.outputs.should-build == 'true'
        env:
          ANDROID_HOME: /tmp/android-sdk
        run: bash scripts/install_aapt.sh

      - name: Pre-download APKs (parallel)
        id: download-apks
        if: steps.check.outputs.should-build == 'true'
        env:
          REPO_VERSIONS: ${{ steps.check.outputs.repo-versions }}
          ANDROID_HOME: /tmp/android-sdk
          ANDROID_BUILD_TOOLS_VERSION: ${{ steps.aapt.outputs.ANDROID_BUILD_TOOLS_VERSION }}
        run: bash scripts/pre_download_apks.sh

      - name: Upload pre-downloaded APKs
        if: steps.check.outputs.should-build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: pre-downloaded-apks
          path: |
            tools/apks/*.apk
            tools/apks/*.xapk
            tools/apks/*.apkm
            tools/apks/*.apks
          retention-days: 1
          if-no-files-found: ignore

  build:
    needs: check-versions
    if: needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check-versions.outputs.matrix-include) }}

    env:
      GH_TOKEN: ${{ github.token }}
      TOOLS_DIR: tools
      APKS_DIR: apps
      OUT_DIR: out
      PATCH_REPO: ${{ matrix.patchRepo }}
      PATCH_BRANCH: ${{ matrix.patchBranch }}
      PATCH_TAG: ${{ matrix.patchTag }}
      PATCH_SLUG: ${{ matrix.patchSlug }}
      CLI_VERSION: ${{ needs.check-versions.outputs.cli-version }}
      CLI_BRANCH: ${{ needs.check-versions.outputs.cli-branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java (for morphe-cli)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify dependencies
        id: deps
        run: |
          set -euo pipefail
          for tool in curl jq unzip; do
            if command -v "$tool" >/dev/null 2>&1; then
              echo "✓ $tool found: $(command -v "$tool")"
            else
              echo "::error::$tool not found"
              exit 1
            fi
          done

      - name: Install BouncyCastle
        if: steps.cache-bc.outputs.cache-hit != 'true'
        run: bash scripts/install_bouncycastle.sh

      - name: Cache BouncyCastle
        id: cache-bc
        uses: actions/cache@v5
        with:
          path: /usr/share/java/bcprov.jar
          key: bouncycastle-bcprov-1.77

      - name: Restore apkeep + Playwright from check-versions
        uses: actions/download-artifact@v8
        with:
          name: apkeep-binary
          path: /usr/local/bin
        continue-on-error: true

      - name: Restore pre-downloaded APKs from check-versions
        uses: actions/download-artifact@v8
        with:
          name: pre-downloaded-apks
          path: ${{ env.TOOLS_DIR }}
        continue-on-error: true

      - name: Restore Playwright browsers from check-versions
        uses: actions/download-artifact@v8
        with:
          name: playwright-browsers
          path: ~/.cache/ms-playwright
        continue-on-error: true

      - name: Prepare build dirs
        run: mkdir -p "$TOOLS_DIR" "$APKS_DIR" "$OUT_DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers (fallback if missing)
        env:
          PLAYWRIGHT_CHROMIUM_DOWNLOAD_HOST: https://storage.googleapis.com/chrome-for-testing-public
        run: bash scripts/install_playwright.sh

      - name: Ensure apkeep is available
        run: |
          set -euo pipefail
          if ! command -v apkeep >/dev/null 2>&1; then
            echo "::warning::apkeep missing after artifact restore; reinstalling"
            bash scripts/install_apkeep.sh
          fi
          apkeep --version

      - name: Cache patches .mpp
        uses: actions/cache@v5
        with:
          path: ${{ env.TOOLS_DIR }}/${{ matrix.patchSlug }}.mpp
          key: morphe-patches-${{ matrix.patchSlug }}-${{ matrix.patchTag }}
          restore-keys: |
            morphe-patches-${{ matrix.patchSlug }}-

      - name: Cache morphe-cli
        uses: actions/cache@v5
        with:
          path: ${{ env.TOOLS_DIR }}/morphe-cli.jar
          key: morphe-cli-${{ needs.check-versions.outputs.cli-version }}
          restore-keys: |
            morphe-cli-

      - name: Get latest Morphe patches + CLI + APKEditor
        id: morphe
        env:
          PATCH_REPO: ${{ matrix.patchRepo }}
          PATCH_TAG: ${{ matrix.patchTag }}
          PATCH_SLUG: ${{ matrix.patchSlug }}
          CLI_VERSION: ${{ env.CLI_VERSION }}
        run: |
          set -euo pipefail
          if [ -z "${PATCH_REPO:-}" ] || [ -z "${PATCH_TAG:-}" ] || [ -z "${PATCH_SLUG:-}" ]; then
            echo "::error::PATCH_REPO/PATCH_TAG/PATCH_SLUG not set. Check check-versions matrix output."
            exit 1
          fi
          if [ -z "${CLI_VERSION:-}" ]; then
            echo "::error::Missing CLI release version."
            exit 1
          fi

          MPP_DEST="$TOOLS_DIR/${PATCH_SLUG}.mpp"
          if [ ! -f "$MPP_DEST" ]; then
            echo "Downloading patches from ${PATCH_REPO}@${PATCH_TAG}..."
            gh release download "$PATCH_TAG" \
              --repo "$PATCH_REPO" \
              --pattern 'patches-*.mpp' \
              --dir "$TOOLS_DIR" >/dev/null
            for f in "$TOOLS_DIR"/patches-*.mpp; do
              [ -f "$f" ] && mv "$f" "$MPP_DEST"
              break
            done
          fi
          if [ ! -f "$MPP_DEST" ]; then
            echo "::error::Failed to obtain ${MPP_DEST} from ${PATCH_REPO}@${PATCH_TAG}."
            exit 1
          fi
          echo "patches_tag=${PATCH_TAG}" >> "$GITHUB_OUTPUT"

          curl -fsSL "https://raw.githubusercontent.com/${PATCH_REPO}/${PATCH_TAG}/patches-list.json" \
            -o "$TOOLS_DIR/patches-list.json"

          if [ ! -f "$TOOLS_DIR/morphe-cli.jar" ]; then
            gh release download "$CLI_VERSION" \
              --repo MorpheApp/morphe-cli \
              --pattern 'morphe-cli-*-all.jar' \
              --dir "$TOOLS_DIR" >/dev/null
          fi

          APKEDITOR_TAG="$(gh release view --repo REAndroid/APKEditor --json tagName -q .tagName)"
          APKEDITOR_ASSET="$(
            gh release view "$APKEDITOR_TAG" --repo REAndroid/APKEditor --json assets \
              -q '.assets[] | select(.name | endswith(".jar")) | .name' \
              | head -n1
          )"
          if [ -z "$APKEDITOR_ASSET" ]; then
            echo "::error::Could not find APKEditor .jar asset on release ${APKEDITOR_TAG}."
            exit 1
          fi
          gh release download "$APKEDITOR_TAG" \
            --repo REAndroid/APKEditor \
            --pattern "$APKEDITOR_ASSET" \
            --dir "$TOOLS_DIR" >/dev/null

          APKEDITOR_JAR_PATH="$TOOLS_DIR/$APKEDITOR_ASSET"
          if [ ! -f "$APKEDITOR_JAR_PATH" ]; then
            echo "::error::APKEditor download failed: $APKEDITOR_JAR_PATH"
            exit 1
          fi
          echo "apkeditor_jar=$APKEDITOR_JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Downloaded APKEditor ${APKEDITOR_TAG}: ${APKEDITOR_ASSET}"

      - name: Resolve supported version for ${{ matrix.appId }}
        id: targetver
        env:
          APP_ID: ${{ matrix.appId }}
          PATCH_REPO: ${{ matrix.patchRepo }}
          TOOLS_DIR: ${{ env.TOOLS_DIR }}
        run: |
          set -euo pipefail
          pin="$(jq -r --arg pkg "$APP_ID" '.patch_repos[$pkg].pin_version // empty' config.json 2>/dev/null || true)"
          disabled="$(jq -c \
            --arg repo "$PATCH_REPO" \
            --arg pkg "$APP_ID" \
            '.[$repo][$pkg] // {} | to_entries | map(select(.value == false) | .key)' \
            patches.json 2>/dev/null || echo '[]')"
          export PINNED_VERSION="$pin" DISABLED_PATCHES_JSON="$disabled"
          node "$GITHUB_WORKSPACE/.github/scripts/resolve-supported-version.js"

      - name: Cache APK for ${{ matrix.appId }}
        id: cache-apk
        uses: actions/cache@v5
        with:
          path: ${{ env.APKS_DIR }}
          key: apk-${{ matrix.appId }}-${{ steps.targetver.outputs.version }}
          restore-keys: apk-${{ matrix.appId }}-

      - name: Install aapt for APK version validation
        id: aapt
        env:
          ANDROID_HOME: /tmp/android-sdk
        run: bash scripts/install_aapt.sh

      - name: Prepare inputs for download-supported-apk.js
        id: targetver_prep
        env:
          APP_ID: ${{ matrix.appId }}
          PATCH_REPO: ${{ matrix.patchRepo }}
        run: bash scripts/prepare_target_version.sh

      - name: Download supported APK for ${{ matrix.appId }}
        id: getapk
        env:
          APP_ID: ${{ matrix.appId }}
          TARGET_VERSION: ${{ steps.targetver.outputs.version }}
          TARGET_VERSIONS: ${{ steps.targetver.outputs.versions }}
          APKS_DIR: ${{ env.APKS_DIR }}
          TOOLS_DIR: ${{ env.TOOLS_DIR }}
          APKEDITOR_JAR: ${{ steps.morphe.outputs.apkeditor_jar }}
          PINNED_CHECK: ${{ steps.targetver_prep.outputs.pinned }}
          PATCH_REPO: ${{ matrix.patchRepo }}
          MORPHE_CLI_JAR: ${{ steps.targetver_prep.outputs.jar }}
          MANUAL_URL: ${{ steps.targetver_prep.outputs.url }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: node "$GITHUB_WORKSPACE/.github/scripts/download-supported-apk.js"

      - name: Prepare signing keystore (required)
        id: keystore
        env:
          TOOLS_DIR: ${{ env.TOOLS_DIR }}
          MATRIX_NAME: ${{ matrix.name }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bash scripts/prepare_keystore.sh

      - name: Patch ${{ matrix.name }} with morphe-cli
        id: patch
        env:
          APP_ID: ${{ matrix.appId }}
          APP_NAME: ${{ matrix.name }}
          APK: ${{ steps.getapk.outputs.apk }}
          APK_VERSION: ${{ steps.getapk.outputs.version }}
          PATCH_TAG: ${{ matrix.patchTag }}
          PATCH_REPO: ${{ matrix.patchRepo }}
          PATCH_SLUG: ${{ matrix.patchSlug }}
          KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          KEY_ALIAS: ${{ steps.keystore.outputs.alias }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ENTRY_PASS: ${{ secrets.KEY_PASSWORD }}
          TOOLS_DIR: ${{ env.TOOLS_DIR }}
          OUT_DIR: ${{ env.OUT_DIR }}
          APKS_DIR: ${{ env.APKS_DIR }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: bash scripts/patch_apk.sh

      - name: Patch APK version for Obtainium
        if: success()
        env:
          APK: ${{ steps.patch.outputs.output }}
          APK_VERSION: ${{ steps.getapk.outputs.version }}
          PATCH_TAG: ${{ matrix.patchTag }}
          KEYSTORE_FILE: ${{ steps.keystore.outputs.p12_path }}
          KEY_ALIAS: ${{ steps.keystore.outputs.alias }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          # patch_obtainium_version.sh operates on an absolute path to
          # the APK inside OUT_DIR. The patch step wrote just the bare
          # filename to GITHUB_OUTPUT, so resolve it here.
          apk="$OUT_DIR/${{ steps.patch.outputs.output }}"
          if [ ! -f "$apk" ]; then
            # Best-effort: some workflows emit an absolute path.
            apk="${{ steps.patch.outputs.output }}"
          fi
          APK="$apk" bash scripts/patch_obtainium_version.sh

      - name: Upload patched ${{ matrix.name }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-v${{ steps.getapk.outputs.version }}-${{ matrix.patchTag }}
          path: out/${{ steps.patch.outputs.output }}

  create-release:
    needs: [check-versions, build]
    if: needs.build.result == 'success' && needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all patched APKs
        uses: actions/download-artifact@v8
        with:
          pattern: "*-v*"
          path: apks
          merge-multiple: true

      - name: List downloaded APKs
        run: ls -la apks/

      - name: Publish per-app releases
        env:
          GH_TOKEN: ${{ github.token }}
          APKS_DIR: apks
          CLI_VERSION: ${{ needs.check-versions.outputs.cli-version }}
          CLI_BRANCH: ${{ needs.check-versions.outputs.cli-branch }}
          REPO_VERSIONS: ${{ needs.check-versions.outputs.repo-versions }}
        run: bash scripts/create_release.sh

  update-state:
    needs: [check-versions, build, create-release]
    if: needs.build.result == 'success' && needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    # `actions: write` is required for `gh cache delete` in the
    # "Prune stale GitHub Actions caches" step below; `actions: read`
    # (the workflow default) is insufficient and causes every delete
    # to fail with HTTP 403. Scoped to this job only — other jobs keep
    # `actions: read` per least-privilege.
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update state.json + sync patches.json
        env:
          REPO_VERSIONS: ${{ needs.check-versions.outputs.repo-versions }}
          CLI_VERSION: ${{ needs.check-versions.outputs.cli-version }}
          CLI_BRANCH: ${{ needs.check-versions.outputs.cli-branch }}
        run: bash scripts/update_state.sh

      - name: Commit and push state.json / patches.json / config.json
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          CLI_VERSION: ${{ needs.check-versions.outputs.cli-version }}
          CLI_BRANCH: ${{ needs.check-versions.outputs.cli-branch }}
        run: bash scripts/commit_state.sh

      - name: Prune stale GitHub Actions caches
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Best-effort: cache pruning failures must not fail the whole
          # update-state step (the important work — committing the new
          # state — already happened).
          node .github/scripts/cleanup-caches.js --apply \
            || echo "::warning::Cache pruning had failures (see above); ignoring."